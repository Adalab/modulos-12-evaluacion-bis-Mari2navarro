<main class="main">
  <!-- HERO -->
  <section class="hero">
    <div class="hero__content">

      <p class="hero__badge">DIRECTORIO VIVO</p>
      
      <h2 class="hero__title">
        La escena urbana 
        <span>también es nuestra</span>
      </h2>

      <p class="hero__text">
        Un mapa abierto de raperas, trapperas, DJs, grafiteras y poetas que están cambiando el sonido y los muros de nuestras ciudades. Escúchalas, sígueles la pista y guarda a tus favoritas. 
      </p>
    </div>

    <div class="hero__images">
      <img
        class="hero__image hero__image--left"
        src="/images/hero-01.webp"
        alt=""
      />

      <img
        class="hero__image hero__image--right"
        src="/images/hero-02.webp"
        alt=""
      />
    </div>
  </section>

  <!-- LISTADO DE ARTISTAS -->
  <section class="artists">
    <div class="artists__header">
      <h2 class="artists__title">Artistas</h2>

      <p class="artists__counter js-counter">
        0 artistas seguidas
      </p>
    </div>

    <ul class="artists__list js-artists-list">
      <!-- JavaScript pintará aquí las artistas -->
    </ul>
  </section>
</main>
